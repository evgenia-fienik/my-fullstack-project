register:
  post:
    tags:
      - Auth
    summary: Register a new user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - email
              - password
            properties:
              name:
                type: string
                example: Ivan
              email:
                type: string
                example: ivan@example.com
              password:
                type: string
                example: password123
    responses:
      '201':
        description: Successfully registered
      '400':
        description: Bad request

login:
  post:
    tags:
      - Auth
    summary: Login user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                example: ivan@example.com
              password:
                type: string
                example: password123
    responses:
      '200':
        description: Successfully logged in
      '401':
        description: Unauthorized

logout:
  post:
    tags:
      - Auth
    summary: Logout user
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Successfully logged out
      '401':
        description: Unauthorized